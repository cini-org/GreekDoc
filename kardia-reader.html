    }

    function goNext() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        renderCard();
      }
    }

    function goPrevious() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard();
      }
    }

    function jumpToCard() {
      const value = Number(jumpInput.value);
      if (!value || value < 1 || value > cards.length) return;
      currentIndex = value - 1;
      renderCard();
    }
