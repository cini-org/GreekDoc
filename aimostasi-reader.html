    let currentIndex = 0;

    const counter = document.getElementById("counter");
    const progressText = document.getElementById("progressText");
    const qNumber = document.getElementById("qNumber");
    const qTitle = document.getElementById("qTitle");
    const qContent = document.getElementById("qContent");
    const cardBox = document.getElementById("cardBox");
    const jumpInput = document.getElementById("jumpInput");

    function renderCard() {
      const card = cards[currentIndex];

      counter.textContent = `Q${card.number} / 148`;
      progressText.textContent = `Πρόοδος: ${card.number} από 148`;
      qNumber.textContent = `Q${card.number}`;
      qTitle.textContent = card.title;
      qContent.innerHTML = card.content;

      cardBox.className = `card ${card.color}`;
    }

    function goNext() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        renderCard();
      }
    }

    function goPrevious() {
      if (currentIndex > 0) {
        currentIndex--;
        renderCard();
      }
    }

    function jumpToCard() {
      const value = Number(jumpInput.value);
      if (!value || value < 1 || value > cards.length) return;
      currentIndex = value - 1;
      renderCard();
    }

    renderCard();
  </script>
